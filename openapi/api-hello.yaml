openapi: 3.1.0
info:
  title: Hello API
  version: 0.1.0
  summary: API REST de ejemplo para saludar opcionalmente por nombre e idioma.
  description: >
    Definición OpenAPI del primer ejemplo del repositorio. La API expone
    un endpoint GET /hello con parámetros opcionales name y lang.
servers:
  - url: http://127.0.0.1:8080
    description: Backend Python
  - url: http://127.0.0.1:8081
    description: Backend Java
tags:
  - name: hello
    description: Operaciones de saludo
paths:
  /hello:
    get:
      tags:
        - hello
      operationId: getHello
      summary: Devuelve un saludo localizado
      description: >
        Devuelve un saludo. Si se envía name, la respuesta incluye un saludo
        personalizado. Si no se envía lang o se envía un código no soportado,
        se usa en.
      parameters:
        - name: name
          in: query
          required: false
          description: Nombre opcional de la persona a saludar.
          schema:
            type: string
            minLength: 1
            examples:
              - Raúl
        - name: lang
          in: query
          required: false
          description: Idioma del saludo.
          schema:
            type: string
            default: en
            enum:
              - en
              - zh
              - hi
              - es
              - fr
              - ar
              - bn
              - pt
              - ru
              - ur
      responses:
        "200":
          description: Saludo generado correctamente
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/HelloWithoutName"
                  - $ref: "#/components/schemas/HelloWithName"
              examples:
                withoutName:
                  summary: Sin nombre
                  value:
                    message: Hello!
                    timestamp: 23:00:00 UTC+00:00
                    ip: 127.0.0.1
                    lang: en
                    has_name: false
                withName:
                  summary: Con nombre e idioma
                  value:
                    message: Hola Raúl!
                    timestamp: 23:00:00 UTC+00:00
                    ip: 127.0.0.1
                    lang: es
                    has_name: true
                    name: Raúl
        "404":
          description: Ruta no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Not Found
        "405":
          description: Método no permitido
          headers:
            Allow:
              schema:
                type: string
              example: GET, POST, OPTIONS
    post:
      tags:
        - hello
      operationId: postHello
      summary: Devuelve un saludo localizado desde JSON
      description: >
        Recibe un cuerpo JSON con name y lang opcionales. Si no se envía lang
        o se envía un código no soportado, se usa en.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HelloRequest"
            examples:
              withName:
                value:
                  name: Raúl
                  lang: es
              withoutName:
                value:
                  lang: en
      responses:
        "200":
          description: Saludo generado correctamente
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/HelloWithoutName"
                  - $ref: "#/components/schemas/HelloWithName"
        "400":
          description: JSON inválido o campos no válidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Ruta no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Método no permitido
          headers:
            Allow:
              schema:
                type: string
              example: GET, POST, OPTIONS
    options:
      tags:
        - hello
      operationId: optionsHello
      summary: Informa los métodos soportados
      responses:
        "204":
          description: Métodos soportados para /hello
          headers:
            Allow:
              schema:
                type: string
              example: GET, POST, OPTIONS
  /hello/languages:
    get:
      tags:
        - hello
      operationId: getHelloLanguages
      summary: Devuelve los idiomas soportados
      description: Devuelve la cantidad total de idiomas soportados y sus códigos.
      responses:
        "200":
          description: Idiomas soportados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelloLanguages"
              example:
                language_count: 10
                languages:
                  - ar
                  - bn
                  - en
                  - es
                  - fr
                  - hi
                  - pt
                  - ru
                  - ur
                  - zh
        "404":
          description: Ruta no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Método no permitido
          headers:
            Allow:
              schema:
                type: string
              example: GET, POST, OPTIONS
    options:
      tags:
        - hello
      operationId: optionsHelloLanguages
      summary: Informa los métodos soportados para /hello/languages
      responses:
        "204":
          description: Métodos soportados para /hello/languages
          headers:
            Allow:
              schema:
                type: string
              example: GET, POST, OPTIONS
components:
  schemas:
    HelloLanguages:
      type: object
      required:
        - language_count
        - languages
      properties:
        language_count:
          type: integer
          minimum: 0
        languages:
          type: array
          items:
            type: string
    HelloRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        lang:
          type: string
          enum:
            - en
            - zh
            - hi
            - es
            - fr
            - ar
            - bn
            - pt
            - ru
            - ur
    HelloBase:
      type: object
      required:
        - message
        - timestamp
        - ip
        - lang
        - has_name
      properties:
        message:
          type: string
        timestamp:
          type: string
          description: Hora UTC en formato HH:mm:ss UTC+00:00
        ip:
          type: string
          description: IP detectada del cliente o del proxy
        lang:
          type: string
          enum:
            - en
            - zh
            - hi
            - es
            - fr
            - ar
            - bn
            - pt
            - ru
            - ur
        has_name:
          type: boolean
    HelloWithoutName:
      allOf:
        - $ref: "#/components/schemas/HelloBase"
        - type: object
          properties:
            has_name:
              const: false
    HelloWithName:
      allOf:
        - $ref: "#/components/schemas/HelloBase"
        - type: object
          required:
            - name
          properties:
            has_name:
              const: true
            name:
              type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

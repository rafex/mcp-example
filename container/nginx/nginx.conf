events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log format para ver las peticiones
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Upstream para los backends individuales (para acceso directo)
    upstream hello-python-api {
        server hello-python-api:8080;
    }

    upstream hello-java-api {
        server hello-java-api:8081;
    }

    upstream date-python-api {
        server date-python-api:8090;
    }

    upstream date-java-api {
        server date-java-api:8091;
    }

    # Upstream balanceados con Round Robin
    upstream hello-balanced {
        server hello-python-api:8080;
        server hello-java-api:8081;
    }

    upstream date-balanced {
        server date-python-api:8090;
        server date-java-api:8091;
    }

    server {
        listen 8085;
        server_name localhost;

        # Health check endpoint
        location /health {
            return 200 '{"status":"ok","service":"nginx-gateway","load_balancer":"round-robin"}';
            add_header Content-Type application/json;
        }

        # Status endpoint para ver balanceadores
        location /status {
            return 200 '{"load_balancers":{"hello":["hello-python-api:8080","hello-java-api:8081"],"date":["date-python-api:8090","date-java-api:8091"]},"active_upstreams":["/hello (round-robin)","/hello/python","/hello/java","/date (round-robin)","/date/python","/date/java"]}';
            add_header Content-Type application/json;
        }

        # Hello API - Python
        location /hello/python {
            proxy_pass http://hello-python-api/hello;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Hello API - Java
        location /hello/java {
            proxy_pass http://hello-java-api/hello;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Hello API (Round Robin entre Python y Java)
        location /hello {
            proxy_pass http://hello-balanced/hello;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Health check para evitar enviar tráfico a instancias caídas
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        }

        # Hello API languages endpoint
        location /hello/languages {
            proxy_pass http://hello-balanced/hello/languages;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Hello API resources endpoint
        location /hello/resources {
            proxy_pass http://hello-balanced/hello/resources;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Hello API prompts endpoint
        location /hello/prompts {
            proxy_pass http://hello-balanced/hello/prompts;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Hello API resources with path - sin regex
        location /hello/resources/ {
            proxy_pass http://hello-balanced/hello/resources/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Hello API prompts with path - sin regex
        location /hello/prompts/ {
            proxy_pass http://hello-balanced/hello/prompts/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Date API - Python
        location /date/python {
            proxy_pass http://date-python-api/date;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Date API - Java
        location /date/java {
            proxy_pass http://date-java-api/date;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Date API (Round Robin entre Python y Java)
        location /date {
            proxy_pass http://date-balanced/date;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Health check para evitar enviar tráfico a instancias caídas
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        }

        # Date API endpoints
        location /date/time {
            proxy_pass http://date-balanced/date/time;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /date/locations {
            proxy_pass http://date-balanced/date/locations;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /date/resources {
            proxy_pass http://date-balanced/date/resources;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /date/prompts {
            proxy_pass http://date-balanced/date/prompts;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Date API resources with path - sin regex
        location /date/resources/ {
            proxy_pass http://date-balanced/date/resources/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Date API prompts with path - sin regex
        location /date/prompts/ {
            proxy_pass http://date-balanced/date/prompts/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API Documentation
        location /docs/ {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ =404;
        }

        # Root redirect to health
        location / {
            return 302 /health;
        }
    }
}

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log format para ver las peticiones
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Upstream para los backends
    upstream hello-python-api {
        server hello-python-api:8080;
    }

    upstream hello-java-api {
        server hello-java-api:8081;
    }

    upstream date-python-api {
        server date-python-api:8090;
    }

    upstream date-java-api {
        server date-java-api:8091;
    }

    server {
        listen 8085;
        server_name localhost;

        # Health check endpoint
        location /health {
            return 200 '{"status":"ok","service":"nginx-gateway"}';
            add_header Content-Type application/json;
        }

        # Hello API - Python
        location /hello/python/ {
            proxy_pass http://hello-python-api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Hello API - Java
        location /hello/java/ {
            proxy_pass http://hello-java-api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Hello API (default to Python)
        location /hello/ {
            proxy_pass http://hello-python-api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Date API - Python
        location /date/python/ {
            proxy_pass http://date-python-api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Date API - Java
        location /date/java/ {
            proxy_pass http://date-java-api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Date API (default to Python)
        location /date/ {
            proxy_pass http://date-python-api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API Documentation
        location /docs/ {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ =404;
        }

        # Root redirect to health
        location / {
            return 302 /health;
        }
    }
}
